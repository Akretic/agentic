[command]
name = "onboard"
description = "Automatically explore a project workspace and populate blueprint.md, context.md, and conventions to fully integrate the agentic pipeline."

[inputs]
# No inputs required. The command discovers everything from the workspace.

[outputs]
blueprint = { type = "file", path = ".agentic/blueprint.md", description = "Populated with stable facts and working assumptions discovered from the project" }
context = { type = "file", path = ".agentic/context.md", description = "Populated with critical constants (ports, paths, hard rules)" }
conventions = { type = "file-list", description = "Convention files added or confirmed for the project's language(s)" }
report = { type = "onboarding-report", description = "Summary of what was discovered, what was populated, and what needs manual input" }

[prompt]
template = """
You are onboarding the agentic pipeline into this project workspace.
Your job is to explore the project, discover its identity, and populate the template files.

## Phase 1: Discovery

Scan the workspace systematically. Check for and read these files (if they exist):

**Project identity:**
- `README.md`, `README`, `docs/` — project description, purpose, stakeholders
- `package.json`, `Cargo.toml`, `pyproject.toml`, `go.mod` — stack, dependencies, scripts
- `.nvmrc`, `.node-version`, `.python-version`, `.tool-versions` — version constraints

**Architecture:**
- Directory structure (list recursively, depth-limited)
- `docker-compose.yml`, `Dockerfile` — services, ports, database config
- `ecosystem.config.js`, `pm2.json`, `Procfile` — process management
- `.env.example`, `.env.local.example` — environment variables, ports, credentials

**Data layer / persistence:**
- ORM schema files: `prisma/schema.prisma`, `src/entity/**`, `drizzle/schema.ts`, etc.
- Migration directories: `prisma/migrations/`, `drizzle/`, `src/migrations/`
- Seed files: `prisma/seed.ts`, `src/db/seed.ts`

**Conventions:**
- `.eslintrc*`, `biome.json`, `.prettierrc*` — lint and format config
- `tsconfig.json` — TypeScript settings (strict mode, paths)
- `ruff.toml`, `pyproject.toml [tool.ruff]` — Python lint settings
- `rust-toolchain.toml` — Rust toolchain version and components
- `rustfmt.toml` — Rust format settings
- `clippy.toml` — Rust lint configuration
- `.cargo/config.toml` — Cargo build settings, registries, target config
- `Cargo.toml [workspace]` — workspace members and shared dependencies
- `justfile`, `Makefile` — task runners (common in Rust projects)
- `.editorconfig` — indent style, charset

**Existing agent config:**
- `.github/copilot-instructions.md` — existing agent instructions (preserve useful rules)
- `.cursor/`, `.windsurf/` — existing agent rules from other platforms
- `.agents/` — existing workflow definitions

**CI/CD:**
- `.github/workflows/` — existing CI checks (these inform which quality gates are already automated)
- `deploy.sh`, `deploy.ps1` — deployment procedures

## Phase 2: Analysis

From what you discovered, determine:

1. **Stack** — primary language(s), framework(s), package manager
2. **Ports** — all service ports (frontend, backend, database, cache, etc.)
3. **Paths** — critical file paths the agent needs to know (schema files, config, entry points)
4. **Architecture rules** — patterns visible in the code structure (module organization, naming)
5. **Hard rules** — constraints from lint config, tsconfig strict settings, existing agent instructions
6. **Verification sequence** — build, lint, test, typecheck commands from package.json scripts
7. **Known gotchas** — non-standard ports, unusual directory structures, pinned dependency versions
8. **Workspace awareness** — if Rust workspace detected, map workspace members and determine
   if verification commands should use `--workspace` flag
9. **Domain-boundary mismatches** — scan for data-crossing hazards using the two-layer model below

### Domain-Boundary Scan (Two-Layer Model)

#### Layer 1: Framework-Agnostic Boundary Scan

This runs for ALL backend or full-stack TS/JS/Python projects that use an ORM or persistence layer.
The goal is to detect mismatches where data contracts between layers are incompatible.

Scan for:
- **ORM / schema files** — read the schema and map which fields are required vs optional
- **Create / update payload construction** — find where ORM write calls are built
- **Helper functions returning nullable values** — scan `src/lib/**`, `src/utils/**`,
  `src/helpers/**` for functions whose return types include `| null`
- **Sanitizers, validators, mappers, DTO transformers** — any function that transforms
  user input before persistence
- **Assignments into persistence payloads** — where request-layer data crosses into
  DB-layer write operations
- **Route / controller / service boundaries** — the seams where data flows from
  request handling into persistence

Flag any pattern where:
- A helper returns `T | null` but the ORM field is required (expects `T` or `T | undefined`)
- A required schema field receives a nullable assignment without coercion
- A DTO/mapper does not normalize nulls before reaching the persistence layer

#### Layer 2: Framework-Specific Enrichers

These help the agent find the relevant boundary files faster. They do NOT define the scan logic.

| Framework | Route/Controller Paths | Service Layer | Notes |
|-----------|----------------------|---------------|-------|
| Next.js App Router | `src/app/api/**/route.ts` | inline or `src/lib/` | API routes colocated with pages |
| NestJS | `src/modules/**/**.controller.ts` | `**.service.ts` | Follows module pattern |
| Express / Fastify | `src/routes/**`, `src/controllers/**` | `src/services/**` | Varies per project |
| Django / FastAPI | `app/views.py`, `app/api/**` | `app/services/**` | Python ORM equivalents |

Use the enricher that matches the discovered framework to prioritize file scanning,
but always fall back to the framework-agnostic Layer 1 scan for the actual analysis.

Record all findings under "Known Gotchas > Boundary Mismatches" in blueprint.md.

## Phase 3: Populate

### 3a. Fill in `.agentic/blueprint.md`

Replace the template placeholders with discovered facts.
- **Stable Facts:** stack, ports, architecture rules, directory layout, verification sequence
- **Data Layer:** ORM name/version, schema path, route handler pattern, shared helper locations
- **Working Assumptions:** current branch, dev credentials (leave as placeholder if not found),
  dependencies of note, known gotchas
- **Known Gotchas > Boundary Mismatches:** any domain-boundary findings from Phase 2 step 9
- Set "Last verified" date to today

### 3b. Fill in `.agentic/context.md`

Extract ONLY the facts most likely to cause bugs when forgotten:
- All service ports
- Non-obvious file paths (schema, config, shared types)
- Hard rules from lint config (no `any`, no `console.log`, etc.)
- If the domain-boundary scan found a recurring pattern (e.g., nullable helpers → ORM required
  fields), add ONE hard rule for it. Only if it is a repeated project pattern.
- Keep it under 25 lines. Be ruthless about what makes the cut.

### 3c. Check conventions

- If the project uses TypeScript, confirm `.agentic/conventions/typescript.md` is appropriate.
  If the project has stricter or different rules, update it.
- If the project uses Python, create `.agentic/conventions/python.md` from discovered lint/format config.
- If the project uses Rust, create `.agentic/conventions/rust.md` from discovered clippy/fmt config.

### 3d. Customize GEMINI.md

- Update the OS Rules section if the project targets a different OS than Windows.
- Update the Verification Commands table with the project's actual commands.
- Do NOT change the Core Principles, Guardrails, or Context Anchoring sections.

## Phase 4: Baseline Verification

After populating all files, run the project's verification sequence to establish baseline health.
This is discovery, not a success/failure gate for onboarding itself.

1. Execute each verification command from the blueprint's verification sequence, in order
2. Record the outcome of each command
3. Classify the overall baseline as one of:
   - ✅ **Green at adoption** — all verification commands pass
   - ⚠️ **Pre-existing failures at adoption** — list each failure with details
4. If failures exist, record them under "Known Gotchas > Pre-Existing Failures" in blueprint.md
   with the tag `[PRE-EXISTING]` so the agent never attributes these to its own work

**Important:** Baseline failures do NOT make onboarding a failure. Onboarding succeeded if it
discovered and recorded the project's state accurately. Verification failures are pre-existing
reality that onboarding is now surfacing.

## Phase 5: Report

Produce an onboarding report with this exact structure:

```markdown
# Onboarding Report

**Project:** [name]
**Date:** [YYYY-MM-DD]
**Onboarding Status:** ✅ COMPLETE / ⚠️ NEEDS MANUAL INPUT

## Discovered

| Category | Value |
|----------|-------|
| Stack | [languages, frameworks] |
| Package Manager | [name + version if found] |
| Ports | [list all discovered ports] |
| Services | [list all services] |
| ORM / Schema | [ORM name, schema path] |
| Route Pattern | [e.g., src/app/api/**/route.ts] |

## Domain-Boundary Findings

<!-- Summarize what the boundary scan discovered. "None found" is a valid outcome. -->

| Finding | Location | Severity |
|---------|----------|----------|
| [description] | [file(s)] | ⚠️ / ℹ️ |

## Populated

| File | Status |
|------|--------|
| blueprint.md | ✅ Filled / ⚠️ Partial (reason) |
| context.md | ✅ Filled / ⚠️ Partial (reason) |
| conventions/ | ✅ Confirmed / 📝 Created [file] |
| GEMINI.md | ✅ Customized / ℹ️ No changes needed |

## Baseline Health

| Command | Status | Notes |
|---------|--------|-------|
| [build command] | ✅ PASS / ❌ FAIL | [details if failed] |
| [lint command] | ✅ PASS / ❌ FAIL | [details if failed] |
| [test command] | ✅ PASS / ❌ FAIL | [details if failed] |

**Adoption Health:** ✅ Green at adoption / ⚠️ Pre-existing failures detected

## Needs Manual Input

<!-- List anything the agent could NOT discover automatically -->
- [ ] [item — why it needs manual input]

## Next Steps

Run `/verify` to perform a full gate-by-gate verification.
```

## Rules
- Re-read `.agentic/context.md` before populating it (to understand the template structure).
- Do NOT invent information. If you can't find a port, say so — don't guess.
- Do NOT modify governance files (quality-gates.md, escalation-protocol.md, etc.).
- Do NOT modify command files (commands/*.toml).
- Mark anything you're uncertain about with `<!-- VERIFY: reason -->` in the populated files.
- Baseline verification failures are **discovered state**, not onboarding failure.
- After onboarding, suggest running `/verify` to perform full gate-by-gate verification.
"""
