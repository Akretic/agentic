[command]
name = "sync"
description = "Pull the latest framework files from the canonical agentic repo and update the local .agentic/ directory."

[inputs]
source = { type = "string", required = false, default = "remote", description = "'remote' syncs from the repo in sync-source.txt, or an absolute local path to a canonical agentic directory" }
dry_run = { type = "boolean", required = false, default = false, description = "If true, show what would change without writing anything" }
force = { type = "boolean", required = false, default = false, description = "If true, sync even when versions match" }
tag = { type = "string", required = false, description = "Specific release tag (e.g., 'v1.2.0'). If omitted, uses the latest tag." }

[outputs]
report = { type = "sync-report", description = "Summary of files updated" }

[prompt]
template = """
You are syncing this project's `.agentic/` directory with the latest framework release.
Keep this fast — clone, copy, report. Do not narrate intermediate steps.

## What Gets Synced

**OVERWRITE from remote (framework files):**
- `.agentic/commands/*.toml`
- `.agentic/conventions/*.md`
- `.agentic/governance/*.md`
- `.agentic/README.md`
- `.agentic/version.txt`
- `.gitattributes`

**MERGE (marker-based):**
- `GEMINI.md` — framework regions updated, protected project blocks preserved

**NEVER TOUCH (project-specific):**
- `.agentic/blueprint.md`
- `.agentic/context.md`
- `.agentic/sync-source.txt`
- `.agentic/architecture/*`

## Procedure

### Step 1: Resolve Source

If `source` is "remote":
1. Read `.agentic/sync-source.txt` for the repo URL
2. Read `.agentic/version.txt` for the local version (default `0.0.0` if missing)
3. Determine the target tag:
   - If `tag` input provided: use it directly
   - Otherwise: run `git ls-remote --tags {repo_url}` and pick the highest semver tag
     (parse lines matching `refs/tags/vX.Y.Z`, sort by semver, take the highest)
4. Compare local version to the remote tag version:
   - Same and `force` is false → print "Already at vX.Y.Z" and stop
   - Otherwise → continue

If `source` is a local path:
1. Verify the path contains `.agentic/version.txt`
2. Use that directory as the source — skip git clone, copy directly

### Step 2: Clone & Copy

1. Clone the repo at the target tag (shallow, single-branch):
   ```powershell
   git clone --depth 1 --branch {tag} {repo_url} .agentic-sync-tmp
   ```
   Run this in the project root directory.

2. If `dry_run` is false, copy framework files from the clone to the local workspace:

   **Copy these directories (overwrite all files in each):**
   - `.agentic-sync-tmp/.agentic/commands/*` → `.agentic/commands/`
   - `.agentic-sync-tmp/.agentic/conventions/*` → `.agentic/conventions/`
   - `.agentic-sync-tmp/.agentic/governance/*` → `.agentic/governance/`

   **Copy these individual files:**
   - `.agentic-sync-tmp/.agentic/README.md` → `.agentic/README.md`
   - `.agentic-sync-tmp/.agentic/version.txt` → `.agentic/version.txt`
   - `.agentic-sync-tmp/.gitattributes` → `.gitattributes`

   Use PowerShell `Copy-Item -Force` for each.

3. If `dry_run` is true, compare the remote and local files and list what differs without writing.

### Step 3: GEMINI.md Merge

1. Read local `GEMINI.md` and remote `.agentic-sync-tmp/GEMINI.md`
2. Find protected blocks in local file using these markers:
   - `<!-- BEGIN PROJECT: VERIFICATION_COMMANDS -->` … `<!-- END PROJECT: VERIFICATION_COMMANDS -->`
   - `<!-- BEGIN PROJECT: OS_RULES -->` … `<!-- END PROJECT: OS_RULES -->`

3. If local has NO markers: flag for manual merge in the report. Do NOT overwrite.
4. If local HAS markers:
   a. Extract each protected block from LOCAL (markers inclusive)
   b. In the REMOTE GEMINI.md, find the same marker pairs
   c. Replace the remote's protected blocks with the local ones
   d. Write the merged result as the new `GEMINI.md`

### Step 4: Flag Local-Only Files

Compare local `.agentic/commands/`, `conventions/`, `governance/` against the remote.
If any local file has no remote counterpart, note it in the report (do NOT delete it).

### Step 5: Cleanup

Remove the temp clone directory:
```powershell
Remove-Item -Recurse -Force .agentic-sync-tmp
```

### Step 6: Report

Print a concise sync report:

```markdown
# Sync Complete

**Version:** X.Y.Z → A.B.C (tag: vA.B.C)
**Mode:** live / dry-run

## Updated Files
| File | Status |
|------|--------|
| commands/onboard.toml | updated |
| conventions/typescript.md | updated |
| ... | ... |

## GEMINI.md
| Region | Status |
|--------|--------|
| VERIFICATION_COMMANDS | preserved (local) |
| OS_RULES | preserved (local) |
| Framework regions | updated (remote) |

## Local-Only Files (not in remote)
- commands/orchestrate.toml — review if still needed

## Skipped (project-specific)
blueprint.md, context.md, sync-source.txt, architecture/*
```

## Rules
- Do NOT narrate each file comparison. Just do it and report the result.
- Do NOT modify project-specific files.
- Do NOT auto-delete local-only files — flag them only.
- Do NOT modify content inside GEMINI.md protected blocks.
- If git clone fails, report the error and stop.
- Always clean up the temp directory, even on failure.
"""
